<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Go Chat</title>
    <style>
      body {
        font-family: Arial;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #chat {
        width: 500px;
        height: 400px;
        border: 1px solid #444;
        overflow-y: auto;
        padding: 10px;
        margin-bottom: 10px;
      }
      input {
        padding: 10px;
        margin: 5px;
        width: 300px;
      }
      button {
        padding: 10px;
      }
      .system {
        color: #888;
      }
      .dm {
        color: #4caf50;
      }
    </style>
  </head>
  <body>
    <h2>Go WebSocket Chat</h2>

    <input id="name" placeholder="Enter your name" />
    <button onclick="connect()">Connect</button>

    <div id="chat"></div>

    <input
      id="msg"
      placeholder="Message..."
      onkeydown="if (event.key === 'Enter') send();"
    />
    <button onclick="send()">Send</button>

    <script>
      let ws;

      function connect() {
        const name = document.getElementById("name").value;
        ws = new WebSocket("ws://localhost:8080/ws");

        ws.onopen = () => {
          ws.send(name);
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          addMessage(data);
        };

        ws.onclose = () => {
          addSystem("Disconnected");
        };
      }

      function send() {
        const input = document.getElementById("msg");
        ws.send(input.value);
        input.value = "";
      }

      function addMessage(data) {
        const chat = document.getElementById("chat");

        const div = document.createElement("div");

        if (data.type === "system") {
          div.className = "system";
          div.innerText = "[SYSTEM] " + data.message;
        } else if (data.type === "dm") {
          div.className = "dm";
          div.innerText = "[DM] " + data.sender + ": " + data.message;
        } else {
          div.innerText = data.sender + ": " + data.message;
        }

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      function addSystem(msg) {
        addMessage({ type: "system", message: msg });
      }
    </script>
  </body>
</html>
